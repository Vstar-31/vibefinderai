services:
  - type: web
    name: vibefinderai-backend
    runtime: python
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      prisma py fetch &&
      prisma generate
    startCommand: bash -c "prisma py fetch && exec uvicorn main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13
      - key: PYTHONUNBUFFERED
        value: 1
